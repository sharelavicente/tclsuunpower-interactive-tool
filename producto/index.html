<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SunPower · Configurador de Panel · Partner Day 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Lexend Deca',sans-serif;background:#f2f2f2;min-height:100vh;min-height:-webkit-fill-available}
#app{width:100%;max-width:520px;margin:0 auto;background:#fff;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column}
.hdr{background:#71257F;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:16px;color:#FFDF00;letter-spacing:2px}
.step-badge{background:rgba(255,255,255,0.15);color:#fff;font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px}
.prog-wrap{height:4px;background:#ddd;flex-shrink:0}
.prog-fill{height:100%;background:#FFDF00;transition:width 0.35s ease}
.body{padding:16px 16px 40px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tracker{background:#71257F;border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.tracker-lbl{font-size:10px;color:rgba(255,255,255,0.7);margin-bottom:1px}
.tracker-val{font-size:22px;font-weight:700;color:#FFDF00;line-height:1}
.tracker-sub{font-size:10px;color:#A6C247;margin-top:3px}
.tracker-right{text-align:right}
.tracker-right span{font-size:10px;color:rgba(255,255,255,0.5);display:block;line-height:1.5}
.tracker-final{font-size:13px;font-weight:700;color:#FFDF00!important}
.q-num{font-size:10px;font-weight:700;color:#DC2D81;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;color:#111;margin-bottom:10px;line-height:1.3}
.q-hint{font-size:13px;font-weight:300;color:#444;line-height:1.6;background:#f7f7f7;border-left:3px solid #FFDF00;padding:10px 12px;border-radius:0 8px 8px 0;margin-bottom:16px}
.q-hint strong{font-weight:700;color:#71257F}
.q-hint .hl{font-weight:700;color:#DC2D81}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt{border:1.5px solid #e0e0e0;border-radius:14px;cursor:pointer;background:#fff;overflow:hidden;transition:border-color .12s,background .12s;-webkit-user-select:none;user-select:none;min-height:64px}
.opt:active{opacity:0.85;transform:scale(0.985)}
.opt.sel{border-color:#71257F;background:#f5edf7}
.opt-inner{display:flex;align-items:center;gap:10px;padding:11px 13px}
.opt-img{width:64px;height:76px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#efefef;display:flex;align-items:center;justify-content:center}
.opt-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.opt-info{flex:1;min-width:0}
.opt-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.opt-label{font-size:15px;font-weight:700;color:#111}
.ty{font-size:9px;background:#FFDF00;color:#000;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tb{font-size:9px;background:#71257F;color:#fff;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tp{font-size:9px;background:#DC2D81;color:#fff;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.opt-sub{font-size:12px;font-weight:300;color:#666;line-height:1.4;margin-bottom:3px}
.opt-price{font-size:12px;font-weight:700;color:#71257F}
.opt-price.base{color:#3a8a0a}
.sp-check{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.opt.sel .sp-check{background:#71257F;border-color:#71257F}
.ck{width:8px;height:5px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:none}
.opt.sel .ck{display:block}
.spec-bar{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.spec-item{font-size:10px;color:#888;background:#f0f0f0;padding:2px 7px;border-radius:6px}
.next-btn{background:#292929;color:#fff;font-family:'Lexend Deca',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;padding:17px 16px;border:none;border-radius:12px;cursor:pointer;width:100%;text-transform:uppercase;transition:background .2s;-webkit-appearance:none;appearance:none;touch-action:manipulation}
.next-btn:active{background:#71257F;transform:scale(0.98)}
.next-btn:disabled{background:#ccc;cursor:not-allowed}
.name-wrap{display:flex;flex-direction:column;gap:16px}
.name-field label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:7px}
.name-field input{width:100%;padding:15px 14px;border:1.5px solid #e0e0e0;border-radius:12px;font-family:'Lexend Deca',sans-serif;font-size:16px;color:#111;outline:none;transition:border-color .2s;-webkit-appearance:none}
.name-field input:focus{border-color:#71257F}
/* Resultado */
.res-hdr{border-radius:14px;overflow:hidden;margin-bottom:16px}
.res-top{background:#71257F;padding:20px 16px 16px;text-align:center}
.res-tag{font-size:10px;font-weight:300;color:rgba(255,255,255,.65);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.res-name{font-size:20px;font-weight:700;color:#FFDF00;margin-bottom:3px;line-height:1.2}
.res-desc{font-size:12px;font-weight:300;color:rgba(255,255,255,.7);margin-bottom:12px}
.res-price-box{background:rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.res-price-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.res-price-big{font-size:28px;font-weight:700;color:#FFDF00;line-height:1}
.res-price-note{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.res-price-right{text-align:right}
.res-base-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.res-base-val{font-size:14px;font-weight:700;color:rgba(255,255,255,.8)}
.sum-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.sum-item{background:#f8f8f8;border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center}
.sum-cat{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sum-val{font-size:13px;font-weight:700;color:#111}
.sum-price{font-size:12px;font-weight:700;color:#71257F}
.sum-price.base{color:#3a8a0a}
.saving-msg{text-align:center;font-size:12px;color:#888;padding:8px 0}
.session-id-note{text-align:center;font-size:10px;color:#bbb;margin-top:8px;font-family:monospace}
.footer-note{text-align:center;font-size:10px;color:#bbb;margin-top:14px;line-height:1.6;padding-bottom:16px}
/* Selector residencial/industrial */
.seg-card{background:#fff;border:2px solid #e0e0e0;border-radius:16px;padding:20px 18px;cursor:pointer;transition:all .15s;margin-bottom:12px;-webkit-user-select:none;user-select:none}
.seg-card:active{transform:scale(0.98)}
.seg-card.residencial{border-color:#71257F}
.seg-card.residencial:hover{background:#f5edf7}
.seg-card.industrial{border-color:#DC2D81}
.seg-card.industrial:hover{background:#fbeaf3}
.seg-icon{font-size:32px;margin-bottom:8px}
.seg-title{font-size:18px;font-weight:700;color:#111;margin-bottom:4px}
.seg-desc{font-size:12px;font-weight:300;color:#666;line-height:1.5}
/* Ranking drag & drop */
.rank-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.rank-item{background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;padding:14px 14px 14px 12px;display:flex;align-items:center;gap:12px;cursor:grab;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:none}
.rank-item:active{cursor:grabbing}
.rank-item.dragging{opacity:0.4;transform:scale(0.98)}
.rank-item.drag-over{border-color:#71257F;background:#f5edf7}
.rank-num{width:30px;height:30px;border-radius:50%;background:#71257F;color:#FFDF00;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-num.top{background:#DC2D81;color:#fff}
.rank-icon{font-size:22px;flex-shrink:0}
.rank-text{flex:1;min-width:0}
.rank-title{font-size:14px;font-weight:700;color:#111;line-height:1.2}
.rank-sub{font-size:11px;font-weight:300;color:#888;margin-top:2px;line-height:1.3}
.rank-handle{color:#bbb;font-size:18px;flex-shrink:0;padding:4px}
.rank-hint-banner{background:#fff8e0;border-radius:10px;padding:10px 13px;font-size:11.5px;color:#665a00;margin-bottom:14px;line-height:1.5;border-left:3px solid #FFDF00}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="logo">SUNPOWER</span>
    <span class="step-badge" id="sbadge">Partner Day</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div id="welcomearea" class="body"></div>
  <div id="segarea" class="body" style="display:none"></div>
  <div id="qarea" class="body" style="display:none"></div>
  <div id="rankarea" class="body" style="display:none"></div>
  <div id="namearea" class="body" style="display:none"></div>
  <div id="rarea" class="body" style="display:none"></div>
</div>

    else if(o.base) pHtml=`<div class="opt-price base">Precio base ✓</div>`;
    else pHtml=`<div class="opt-price">+${o.p.toFixed(3).replace('.',',')} €/W</div>`;
    const tags=[];
    if(o.badge_yellow) tags.push(`<span class="ty">${o.badge_yellow}</span>`);
    if(o.badge_pink) tags.push(`<span class="tp">${o.badge_pink}</span>`);
    if(o.badge_blue||o.rec) tags.push(`<span class="tb">${o.badge_blue||'Recomendado'}</span>`);
    const specHtml=(o.spec||[]).map(s=>`<span class="spec-item">${s}</span>`).join('');
    return `<div class="opt ${isSel?'sel':''}" onclick="pick('${q.id}',${i})">

// Drag & drop desktop
let draggedIndex = null;
function onDragStart(e){
  draggedIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e){
  e.preventDefault();
  const targetIndex = parseInt(e.currentTarget.dataset.index);
  if(draggedIndex !== null && draggedIndex !== targetIndex){
    const item = rankList.splice(draggedIndex, 1)[0];
    rankList.splice(targetIndex, 0, item);
    renderRanking();
  }
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('drag-over','dragging'));
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('drag-over'));
}

// Touch drag para móvil
let touchDragItem = null;
let touchStartY = 0;
let touchClone = null;

function onTouchStart(e){
  const item = e.currentTarget;
  touchDragItem = item;
  touchStartY = e.touches[0].clientY;
  item.classList.add('dragging');
}

function onTouchMove(e){
  if(!touchDragItem) return;
  e.preventDefault();
  const touch = e.touches[0];
  // Detectar elemento debajo del dedo
  touchDragItem.style.opacity = '0.4';
  const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  const itemBelow = elementBelow?.closest('.rank-item');
  document.querySelectorAll('.rank-item').forEach(el=>{
    if(el !== touchDragItem) el.classList.remove('drag-over');
  });
  if(itemBelow && itemBelow !== touchDragItem){
    itemBelow.classList.add('drag-over');
  }
}

function onTouchEnd(e){
  if(!touchDragItem) return;
  const touch = e.changedTouches[0];
  const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  const itemBelow = elementBelow?.closest('.rank-item');
  touchDragItem.style.opacity = '';
  touchDragItem.classList.remove('dragging');
  if(itemBelow && itemBelow !== touchDragItem){
    const fromIdx = parseInt(touchDragItem.dataset.index);
    const toIdx = parseInt(itemBelow.dataset.index);
    const item = rankList.splice(fromIdx, 1)[0];
    rankList.splice(toIdx, 0, item);
    renderRanking();
  }
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('drag-over'));
  touchDragItem = null;
}

    <div class="session-id-note">ID sesión: ${SESSION_ID}</div>
    <button class="next-btn" onclick="restart()">CONFIGURAR OTRO PANEL</button>
    <div class="footer-note">Partner Day SunPower · Barcelona, 2–3 julio 2026</div>`;

  // Guardar respuesta
  const saveEl = document.getElementById('save-status');
  if(saveEl) saveEl.textContent = 'Guardando configuración...';
  const payload = {
    segment: segment,
    name: installerName,
    company: installerCompany,
    panel: pName,
    price_eur_w: (BASE_PRICE+d).toFixed(3),
    base_price: BASE_PRICE,
    delta: d.toFixed(3),
    selections: Object.fromEntries(qs.map(q=>[q.id, sel[q.id]?.l||''])),
    ranking: rankList.map((r,i)=>({position: i+1, attribute: r.id, title: r.title}))
  };
  await saveResponse(payload);
  if(saveEl) saveEl.textContent = '✓ Configuración guardada';
}

function restart(){
  segment = null; step = 0; sel = {}; rankList = []; installerName = ''; installerCompany = '';
  ['welcomearea','segarea','qarea','rankarea','namearea','rarea'].forEach(id=>document.getElementById(id).style.display='none');
  showWelcome();
}

showWelcome();
</script>
