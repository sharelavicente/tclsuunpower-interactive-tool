<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunPower | Resultados Roundtable BOS 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lexend Deca',sans-serif;background:#f2f3f8;color:#222}
header{background:#71257F;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#FFDF00;font-weight:700;font-size:20px;letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:12px}
.badge{background:#FFDF00;color:#71257F;font-weight:700;font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:.5px}
.btn-refresh{background:transparent;border:1.5px solid #FFDF00;color:#FFDF00;font-family:'Lexend Deca',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.btn-refresh:hover{background:#FFDF00;color:#71257F}
.container{max-width:1100px;margin:0 auto;padding:32px 24px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi .val{font-size:36px;font-weight:700;color:#71257F}
.kpi .lbl{font-size:12px;color:#888;font-weight:300;margin-top:4px}
.section-block-title{background:#71257F;color:#FFDF00;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:12px 20px;border-radius:10px;margin:32px 0 16px}
.section{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tag{display:inline-block;background:#71257F;color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:1px;margin-bottom:8px}
.section-q{font-size:16px;font-weight:700;color:#222;margin-bottom:20px;line-height:1.4}
.bar-wrap{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:13px;font-weight:300;color:#333;min-width:260px;flex-shrink:0;line-height:1.4}
.bar-track{flex:1;height:28px;background:#f2f3f8;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:#71257F;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:36px}
.bar-fill.yellow{background:#FFDF00}
.bar-pct{font-size:12px;font-weight:700;color:#fff}
.bar-pct.dark{color:#71257F}
.bar-count{font-size:12px;color:#aaa;font-weight:300;min-width:40px;text-align:right}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f7f4ff;border-radius:10px;border-left:4px solid #71257F}
.rank-row.r1{border-color:#FFDF00;background:#fffbe6}
.rank-pos{width:28px;height:28px;border-radius:50%;background:#71257F;color:#FFDF00;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-pos.p1{background:#FFDF00;color:#71257F}
.rank-txt{font-size:14px;font-weight:300;flex:1}
.rank-score{font-size:12px;font-weight:700;color:#71257F;background:#e8d5f0;padding:3px 10px;border-radius:10px}
.open-list{display:flex;flex-direction:column;gap:10px}
.open-item{background:#f7f4ff;border-left:3px solid #FFDF00;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:300;color:#333;line-height:1.6}
.export-bar{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.export-bar p{font-size:13px;color:#666;font-weight:300}
.export-btns{display:flex;gap:10px}
.btn-export{background:#71257F;color:#fff;font-family:'Lexend Deca',sans-serif;font-size:12px;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s}
.btn-export:hover{background:#FFDF00;color:#71257F}
.btn-export.outline{background:#fff;color:#71257F;border:1.5px solid #71257F}
.btn-export.outline:hover{background:#71257F;color:#FFDF00}
.empresas-wrap{display:flex;flex-wrap:wrap;gap:8px}
.empresa-tag{background:#f7f4ff;border:1.5px solid #e8d5f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:300}
.loading{text-align:center;padding:80px 24px}
.spinner{width:48px;height:48px;border:4px solid #e8d5f0;border-top-color:#71257F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#888;font-size:14px;font-weight:300}
.empty{text-align:center;padding:40px;color:#aaa;font-size:14px;font-weight:300}
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .bar-label{min-width:150px;font-size:12px}
  header{padding:14px 16px}
  .container{padding:20px 16px}
}
</style>
</head>
<body>
<header>
  <div class="logo">SUNPOWER</div>
  <div class="header-right">
    <div class="badge">Roundtable BOS 2026</div>
    <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
  </div>
</header>
<div class="container">
  <div id="root"><div class="loading"><div class="spinner"></div><p>Cargando respuestas...</p></div></div>
</div>

<script>
const JSONBIN_KEY = '$2a$10$OzmEbFf894axitPqkgWb.OUTKCUQ76nd8gX7t2/NgsdxpuAYmfnMK';
const JSONBIN_BIN = '6a43864ada38895dfe14cddb';

let allResponses = [];

const Q_META = {
  b1:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Cuál es tu porcentaje actual de instalaciones nuevas con baterías?',type:'single'},
  b2:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Qué cargas incluís dentro del backup?',type:'single'},
  b3:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Instaláis ATS en instalaciones All In One con Backup?',type:'single'},
  b4:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Cómo solventáis el problema de tensión superior a 253V?',type:'single'},
  b5:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Preferís Inline Meter o Meter con toroidal externo?',type:'single'},
  b6:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Potencia de inversor más instalada en monofásico?',type:'single'},
  b7:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Potencia de inversor más instalada en trifásico?',type:'single'},
  b8:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿El cliente pagaría una ampliación de garantía de 5 años?',type:'single'},
  b9:{tag:'BOS · BATERÍA RESIDENCIAL',text:'¿Los optimizadores/MLPE son una necesidad en residencial?',type:'multi'},
  b10:{tag:'BOS · BATERÍA RESIDENCIAL',text:'Las 5 características más importantes para baterías residenciales',type:'ranking'},
  b11:{tag:'BOS · BATERÍA INDUSTRIAL',text:'¿Porcentaje de ofertas industriales con baterías?',type:'single'},
  b12:{tag:'BOS · BATERÍA INDUSTRIAL',text:'¿Escenario más típico en instalaciones de baterías industriales?',type:'multi'},
  b13:{tag:'BOS · BATERÍA INDUSTRIAL',text:'¿Factor más relevante en batería industrial, después del precio?',type:'ranking'},
  b14:{tag:'BOS · BATERÍA INDUSTRIAL',text:'Las 5 características más importantes para baterías industriales',type:'ranking'},
  b15:{tag:'BOS · AEROTERMIA',text:'¿Vendéis e instaláis productos de climatización?',type:'single'},
  b16:{tag:'BOS · AEROTERMIA',text:'¿Factor más relevante en una instalación de aerotermia?',type:'ranking'},
  b17:{tag:'BOS · CARGADORES EV',text:'¿Vendéis e instaláis cargadores EV?',type:'single'},
  b18:{tag:'BOS · CARGADORES EV',text:'¿Se instala más la marca del coche o de otra marca?',type:'single'},
  b19:{tag:'BOS · CARGADORES EV',text:'¿Factor más relevante en una instalación de cargador EV?',type:'ranking'}
};

const BLOCKS = [
  {key:'BOS · BATERÍA RESIDENCIAL', label:'🏠🔋 Batería Residencial', qs:['b1','b2','b3','b4','b5','b6','b7','b8','b9','b10']},
  {key:'BOS · BATERÍA INDUSTRIAL', label:'🏭🔋 Batería Industrial', qs:['b11','b12','b13','b14']},
  {key:'BOS · AEROTERMIA', label:'🌡️ Aerotermia', qs:['b15','b16']},
  {key:'BOS · CARGADORES EV', label:'🔌🚗 Cargadores EV', qs:['b17','b18','b19']}
];

async function loadData(){
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div><p>Cargando respuestas...</p></div>';
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`,{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const data = await res.json();
    const raw = data.record;
    if(Array.isArray(raw)) allResponses = raw;
    else if(Array.isArray(raw?.responses)) allResponses = raw.responses;
    else allResponses = [raw].filter(Boolean);
    render();
  }catch(e){
    document.getElementById('root').innerHTML='<div class="empty">⚠️ Error al cargar los datos.</div>';
  }
}

function getQ(qid){
  return allResponses.map(r=>r.responses?.find(x=>x.id===qid)).filter(Boolean);
}

function countOptions(answers){
  const counts={};
  answers.forEach(a=>{
    const opts=Array.isArray(a)?a:[a];
    opts.forEach(o=>{if(o) counts[o]=(counts[o]||0)+1;});
  });
  return counts;
}

function renderBarChart(counts, total){
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  return sorted.map(([opt,cnt],i)=>{
    const pct=Math.round(cnt/total*100);
    const barW=Math.round(cnt/max*100);
    const isYellow=i===0;
    return `<div class="bar-row">
      <div class="bar-label">${opt}</div>
      <div class="bar-track"><div class="bar-fill ${isYellow?'yellow':''}" style="width:${barW}%"><span class="bar-pct ${isYellow?'dark':''}">${pct}%</span></div></div>
      <div class="bar-count">${cnt}/${total}</div>
    </div>`;
  }).join('');
}

function avgRanking(qid, items){
  const scores={};
  items.forEach(it=>scores[it]=0);
  allResponses.forEach(r=>{
    const q = r.responses?.find(x=>x.id===qid);
    if(!q || !Array.isArray(q.answer)) return;
    q.answer.forEach((title,idx)=>{
      if(scores[title]!==undefined) scores[title] += (items.length - idx);
    });
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1]);
}

function renderQuestionSection(qid){
  const meta = Q_META[qid];
  const entries = getQ(qid);
  if(!entries.length) return '';

  if(meta.type==='single' || meta.type==='multi'){
    const answers = entries.map(e=>e.answer).filter(a=>a!==null&&a!=='');
    if(!answers.length) return '';
    const counts = countOptions(answers);
    let html = `<div class="section">
      <span class="tag">${meta.tag}</span>
      <div class="section-q">${meta.text}</div>
      <div class="bar-wrap">${renderBarChart(counts, answers.length)}</div>`;
    const others = entries.filter(e=>e.other_text).map(e=>e.other_text);
    if(others.length){
      html += `<div style="margin-top:16px">
        <div style="font-size:12px;font-weight:700;color:#71257F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Otros mencionados</div>
        <div class="open-list">${others.map(o=>`<div class="open-item">"${o}"</div>`).join('')}</div>
      </div>`;
    }
    html += `</div>`;
    return html;
  }

  if(meta.type==='ranking'){
    const items = entries[0]?.answer || [];
    if(!items.length) return '';
    const ranked = avgRanking(qid, items);
    let html = `<div class="section">
      <span class="tag">${meta.tag}</span>
      <div class="section-q">${meta.text}</div>
      <div class="rank-list">`;
    ranked.forEach(([item,score],i)=>{
      html += `<div class="rank-row ${i===0?'r1':''}">
        <div class="rank-pos ${i===0?'p1':''}">${i+1}</div>
        <div class="rank-txt">${item}</div>
        <div class="rank-score">Score: ${score}</div>
      </div>`;
    });
    html += `</div>`;
    const others = entries.filter(e=>e.other_text).map(e=>e.other_text);
    if(others.length){
      html += `<div style="margin-top:16px">
        <div style="font-size:12px;font-weight:700;color:#71257F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Otros mencionados</div>
        <div class="open-list">${others.map(o=>`<div class="open-item">"${o}"</div>`).join('')}</div>
      </div>`;
    }
    html += `</div>`;
    return html;
  }
  return '';
}

function render(){
  const n = allResponses.length;
  const nEmp = allResponses.filter(r=>r.empresa).length;
  const last = n>0 ? new Date(allResponses[allResponses.length-1].timestamp).toLocaleString('es-ES') : '—';

  let html = '';

  html+=`<div class="kpi-row">
    <div class="kpi"><div class="val">${n}</div><div class="lbl">Respuestas totales</div></div>
    <div class="kpi"><div class="val">${nEmp}</div><div class="lbl">Empresas identificadas</div></div>
    <div class="kpi"><div class="val">${n>0?Math.round(allResponses.filter(r=>r.responses?.every(q=>q.answer!==null)).length/n*100)+'%':'—'}</div><div class="lbl">Encuestas completas</div></div>
    <div class="kpi"><div class="val" style="font-size:16px">${last}</div><div class="lbl">Última respuesta</div></div>
  </div>`;

  if(n===0){
    html+='<div class="empty">Aún no hay respuestas. Aparecerán aquí en tiempo real.</div>';
    document.getElementById('root').innerHTML=html;
    return;
  }

  html+=`<div class="export-bar">
    <p>📊 ${n} respuesta${n>1?'s':''} recogida${n>1?'s':''} — Partner Day Barcelona · Julio 2026</p>
    <div class="export-btns">
      <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn-export outline" onclick="exportJSON()">⬇ JSON</button>
    </div>
  </div>`;

  BLOCKS.forEach(block=>{
    let blockHtml = block.qs.map(qid=>renderQuestionSection(qid)).join('');
    if(blockHtml){
      html += `<div class="section-block-title">${block.label}</div>${blockHtml}`;
    }
  });

  const empresas = [...new Set(allResponses.filter(r=>r.empresa).map(r=>r.empresa+(r.nombre?' ('+r.nombre+')':'')))];
  if(empresas.length){
    html+=`<div class="section">
      <span class="tag">EMPRESAS IDENTIFICADAS</span>
      <div class="section-q">Partners que han completado el roundtable</div>
      <div class="empresas-wrap">${empresas.map(e=>`<span class="empresa-tag">${e}</span>`).join('')}</div>
    </div>`;
  }

  document.getElementById('root').innerHTML=html;
}

function exportCSV(){
  let csv='session_id,timestamp,empresa,nombre,pregunta_id,tag,pregunta,tipo,respuesta,otro_texto\n';
  allResponses.forEach(r=>{
    r.responses?.forEach(q=>{
      const a=Array.isArray(q.answer)?q.answer.join(' | '):(q.answer??'');
      csv+=`"${r.session_id}","${r.timestamp}","${r.empresa||''}","${r.nombre||''}","${q.id}","${q.tag}","${q.question?.replace(/"/g,'""')}","${q.type}","${String(a).replace(/"/g,'""')}","${(q.other_text||'').replace(/"/g,'""')}"\n`;
    });
  });
  dl(new Blob([csv],{type:'text/csv'}),'sunpower_bos_resultados.csv');
}

function exportJSON(){
  dl(new Blob([JSON.stringify({total:allResponses.length,responses:allResponses},null,2)],{type:'application/json'}),'sunpower_bos_resultados.json');
}

function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

loadData();
</script>
</body>
</html>
