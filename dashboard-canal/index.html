<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunPower | Resultados Roundtable Canal 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lexend Deca',sans-serif;background:#f2f3f8;color:#222}

header{background:#71257F;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#FFDF00;font-weight:700;font-size:20px;letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:12px}
.badge{background:#FFDF00;color:#71257F;font-weight:700;font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:.5px}
.btn-refresh{background:transparent;border:1.5px solid #FFDF00;color:#FFDF00;font-family:'Lexend Deca',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.btn-refresh:hover{background:#FFDF00;color:#71257F}

.container{max-width:1100px;margin:0 auto;padding:32px 24px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi .val{font-size:36px;font-weight:700;color:#71257F}
.kpi .lbl{font-size:12px;color:#888;font-weight:300;margin-top:4px}

/* SECTION */
.section{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.section-title{font-size:13px;font-weight:700;color:#71257F;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.section-q{font-size:16px;font-weight:700;color:#222;margin-bottom:20px;line-height:1.4}
.tag{display:inline-block;background:#71257F;color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:1px;margin-bottom:8px}

/* BAR CHART */
.bar-wrap{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:13px;font-weight:300;color:#333;min-width:260px;flex-shrink:0;line-height:1.4}
.bar-track{flex:1;height:28px;background:#f2f3f8;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:#71257F;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
.bar-fill.yellow{background:#FFDF00}
.bar-pct{font-size:12px;font-weight:700;color:#fff}
.bar-pct.dark{color:#71257F}
.bar-count{font-size:12px;color:#aaa;font-weight:300;min-width:40px;text-align:right}

/* RANKING */
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f7f4ff;border-radius:10px;border-left:4px solid #71257F}
.rank-row.r1{border-color:#FFDF00;background:#fffbe6}
.rank-pos{width:28px;height:28px;border-radius:50%;background:#71257F;color:#FFDF00;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-pos.p1{background:#FFDF00;color:#71257F}
.rank-txt{font-size:14px;font-weight:300;flex:1}
.rank-score{font-size:12px;font-weight:700;color:#71257F;background:#e8d5f0;padding:3px 10px;border-radius:10px}

/* OPEN ANSWERS */
.open-list{display:flex;flex-direction:column;gap:10px}
.open-item{background:#f7f4ff;border-left:3px solid #FFDF00;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:300;color:#333;line-height:1.6}
.open-meta{font-size:11px;color:#aaa;margin-top:6px}

/* EXPORT */
.export-bar{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.export-bar p{font-size:13px;color:#666;font-weight:300}
.export-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-export{background:#71257F;color:#fff;font-family:'Lexend Deca',sans-serif;font-size:12px;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.btn-export:hover{background:#FFDF00;color:#71257F}
.btn-export.outline{background:#fff;color:#71257F;border:1.5px solid #71257F}
.btn-export.outline:hover{background:#71257F;color:#FFDF00}

/* LOADING */
.loading{text-align:center;padding:80px 24px}
.loading .spinner{width:48px;height:48px;border:4px solid #e8d5f0;border-top-color:#71257F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#888;font-size:14px;font-weight:300}

.empty{text-align:center;padding:40px;color:#aaa;font-size:14px;font-weight:300}

@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .bar-label{min-width:140px;font-size:12px}
  header{padding:14px 16px}
  .container{padding:20px 16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">SUNPOWER</div>
  <div class="header-right">
    <div class="badge">Roundtable Canal 2026</div>
    <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
  </div>
</header>

<div class="container">
  <div id="root"><div class="loading"><div class="spinner"></div><p>Cargando respuestas...</p></div></div>
</div>

<script>
const JSONBIN_KEY = '$2a$10$OzmEbFf894axitPqkgWb.OUTKCUQ76nd8gX7t2/NgsdxpuAYmfnMK';
const JSONBIN_BIN = '6a2946a6f5f4af5e29d786c6';

const Qs = [
  {id:'c4',tag:'CANAL · PROGRAMA PARTNER',type:'single',text:'¿Cuál es tu nivel de conocimiento sobre el Programa Partner SunPower?'},
  {id:'c5',tag:'CANAL · PROGRAMA PARTNER',type:'ranking',text:'¿Qué elementos son más relevantes para cerrar ventas con clientes?'},
  {id:'c6',tag:'CANAL · PROGRAMA PARTNER',type:'single',text:'Respecto a la competencia, ¿cómo valoras el servicio y los beneficios de trabajar con SunPower?'},
  {id:'c7',tag:'CANAL · GARANTÍAS',type:'single',text:'¿Cuál es tu nivel de conocimiento sobre el proceso de registro de garantías SunPower?'},
  {id:'c8',tag:'CANAL · GARANTÍAS',type:'multi',text:'¿Cuáles son las razones más importantes para que el cliente final registre su garantía?'},
  {id:'c9',tag:'CANAL · PROGRAMA PARTNER',type:'open',text:'¿Cómo valoras la diferenciación de precios por nivel (Authorized, Premier, Elite)?'},
  {id:'c10',tag:'CANAL · PROGRAMA PARTNER',type:'open',text:'¿Cuánto debería ser la diferencia de precio entre un nivel y otro (%)?'},
  {id:'c11',tag:'CANAL · PROGRAMA PARTNER',type:'open',text:'¿Qué elementos sugieres que podrían ser diferenciadores entre un nivel y otro?'},
  {id:'c12',tag:'CANAL · FORMACIÓN',type:'ranking',text:'¿En qué áreas de formación tienes mayor necesidad?'},
  {id:'c13',tag:'CANAL · FORMACIÓN',type:'open',text:'¿Qué otros servicios de formación te serían útiles?'},
  {id:'c14',tag:'CANAL · CALIDAD',type:'single',text:'¿Cómo valorarías que SunPower volviera a realizar encuestas a clientes finales?'}
];

let allResponses = [];

async function loadData(){
  document.getElementById('root').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando respuestas...</p></div>';
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`,{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const data = await res.json();
    allResponses = data.record.responses || [];
    render();
  }catch(e){
    document.getElementById('root').innerHTML = '<div class="empty">⚠️ Error al cargar los datos. Verifica la conexión.</div>';
  }
}

function getAnswers(qid){
  return allResponses.map(r => {
    const q = r.responses?.find(x => x.id === qid);
    return q?.answer ?? null;
  }).filter(a => a !== null);
}

function countOptions(answers){
  const counts = {};
  answers.forEach(a => {
    const opts = Array.isArray(a) ? a : [a];
    opts.forEach(o => { if(o) counts[o] = (counts[o]||0)+1; });
  });
  return counts;
}

function avgRanking(answers, items){
  const scores = {};
  items.forEach(it => scores[it] = 0);
  answers.forEach(arr => {
    if(!Array.isArray(arr)) return;
    arr.forEach((it, i) => { if(scores[it]!==undefined) scores[it] += (arr.length - i); });
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1]);
}

function render(){
  const n = allResponses.length;
  const empresas = allResponses.filter(r=>r.empresa).length;
  const completas = allResponses.filter(r=>r.responses?.every(q=>q.answer!==null)).length;
  const lastTs = n > 0 ? new Date(allResponses[allResponses.length-1].timestamp).toLocaleString('es-ES') : '—';

  let html = '';

  // KPIs
  html += `<div class="kpi-row">
    <div class="kpi"><div class="val">${n}</div><div class="lbl">Respuestas totales</div></div>
    <div class="kpi"><div class="val">${completas}</div><div class="lbl">Encuestas completas</div></div>
    <div class="kpi"><div class="val">${empresas}</div><div class="lbl">Empresas identificadas</div></div>
    <div class="kpi"><div class="val" style="font-size:18px">${lastTs}</div><div class="lbl">Última respuesta</div></div>
  </div>`;

  if(n === 0){
    html += '<div class="empty">Aún no hay respuestas registradas. Las verás aquí en tiempo real durante el evento.</div>';
    document.getElementById('root').innerHTML = html;
    return;
  }

  // Export bar
  html += `<div class="export-bar">
    <p>📊 ${n} respuesta${n>1?'s':''} recogida${n>1?'s':''} — Partner Day Barcelona · Julio 2026</p>
    <div class="export-btns">
      <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="btn-export outline" onclick="exportJSON()">⬇ Exportar JSON</button>
    </div>
  </div>`;

  // Render each question
  Qs.forEach(q => {
    const answers = getAnswers(q.id).filter(a => a !== null && a !== '' && !(Array.isArray(a) && a.length===0));
    if(answers.length === 0) return;

    html += `<div class="section"><span class="tag">${q.tag}</span><div class="section-q">${q.text}</div>`;

    if(q.type === 'single' || q.type === 'multi'){
      const counts = countOptions(answers);
      const total = Object.values(counts).reduce((a,b)=>a+b,0);
      const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      const max = sorted[0]?.[1] || 1;
      html += '<div class="bar-wrap">';
      sorted.forEach(([opt,cnt],i) => {
        const pct = Math.round(cnt/answers.length*100);
        const barW = Math.round(cnt/max*100);
        const isYellow = i===0;
        html += `<div class="bar-row">
          <div class="bar-label">${opt}</div>
          <div class="bar-track">
            <div class="bar-fill ${isYellow?'yellow':''}" style="width:${barW}%">
              <span class="bar-pct ${isYellow?'dark':''}">${pct}%</span>
            </div>
          </div>
          <div class="bar-count">${cnt}/${answers.length}</div>
        </div>`;
      });
      html += '</div>';
    }

    else if(q.type === 'ranking'){
      // Get all items from first answer
      const items = Array.isArray(answers[0]) ? [...new Set(answers.flat())] : [];
      if(items.length){
        const ranked = avgRanking(answers, items);
        html += '<div class="rank-list">';
        ranked.forEach(([item, score], i) => {
          html += `<div class="rank-row ${i===0?'r1':''}">
            <div class="rank-pos ${i===0?'p1':''}">${i+1}</div>
            <div class="rank-txt">${item}</div>
            <div class="rank-score">Score: ${score}</div>
          </div>`;
        });
        html += '</div>';
      }
    }

    else if(q.type === 'open'){
      const nonEmpty = answers.filter(a => a && a.trim() !== '');
      if(nonEmpty.length){
        html += '<div class="open-list">';
        nonEmpty.forEach((a,i) => {
          const r = allResponses.find(resp => resp.responses?.find(x=>x.id===q.id)?.answer === a);
          const meta = r?.empresa ? r.empresa : `Participante ${i+1}`;
          html += `<div class="open-item">"${a}"<div class="open-meta">${meta}</div></div>`;
        });
        html += '</div>';
      } else {
        html += '<div class="empty" style="padding:16px">Sin respuestas abiertas aún</div>';
      }
    }

    html += '</div>';
  });

  document.getElementById('root').innerHTML = html;
}

function exportCSV(){
  let csv = 'session_id,timestamp,empresa,nombre,pregunta_id,tag,pregunta,tipo,respuesta\n';
  allResponses.forEach(r => {
    r.responses?.forEach(q => {
      const a = Array.isArray(q.answer) ? q.answer.join(' | ') : (q.answer ?? '');
      csv += `"${r.session_id}","${r.timestamp}","${r.empresa||''}","${r.nombre||''}","${q.id}","${q.tag}","${q.question?.replace(/"/g,'""')||''}","${q.type}","${String(a).replace(/"/g,'""')}"\n`;
    });
  });
  dl(new Blob([csv],{type:'text/csv'}),'sunpower_canal_resultados.csv');
}

function exportJSON(){
  dl(new Blob([JSON.stringify({total:allResponses.length,responses:allResponses},null,2)],{type:'application/json'}),'sunpower_canal_resultados.json');
}

function dl(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}

loadData();
</script>
</body>
</html>
